<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión CAP — Detalle</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230f1d36'/><text x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-size='16' fill='%23c8a951' font-weight='bold'>G</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap');
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;color:#1e2738;background:#f7f8fa;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.6}a{color:#274a82;text-decoration:none;transition:all .3s ease}a:hover{color:#c8a951}h1,h2,h3{font-family:'Playfair Display',serif;color:#0f1d36;line-height:1.2}.app-layout{display:flex;min-height:100vh}.sidebar{width:255px;background:linear-gradient(180deg,#0f1d36,#080e1a);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:all .3s ease;border-right:1px solid rgba(255,255,255,.05)}.sidebar-header{padding:1.35rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.06)}.brand{display:flex;align-items:center;gap:.7rem}.brand-icon{width:36px;height:36px;background:linear-gradient(135deg,#c8a951,#8a6d1e);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:#fff;font-family:'Playfair Display',serif}.brand-text{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700}.brand-zone{font-size:.68rem;color:#d9bf6e;text-transform:uppercase;letter-spacing:.1em}.sidebar-nav{flex:1;padding:.75rem .65rem;overflow-y:auto}.nav-section-title{font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.25);padding:.85rem .75rem .4rem;font-weight:600}.nav-item{display:flex;align-items:center;gap:.7rem;padding:.65rem .75rem;border-radius:8px;color:rgba(255,255,255,.55);font-size:.88rem;font-weight:500;transition:all .3s ease;margin-bottom:2px}.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.9)}.nav-item.active{background:rgba(200,169,81,.12);color:#d9bf6e;font-weight:600}.nav-icon{font-size:1.1rem;width:22px;text-align:center}.sidebar-footer{padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,.06)}.sidebar-user{display:flex;align-items:center;gap:.65rem}.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#274a82,#3562a8);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff}.user-info{flex:1;min-width:0}.user-name{font-size:.82rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.user-role{font-size:.7rem;color:rgba(255,255,255,.35)}.btn-logout-s{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:1.05rem;padding:.3rem;border-radius:8px}.btn-logout-s:hover{color:#d43535}.main-content{flex:1;margin-left:255px;min-height:100vh}.top-header{background:#fff;border-bottom:1px solid #eceef3;padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 2px rgba(15,29,54,.05)}.page-title{font-size:1.25rem;color:#0f1d36}.page-breadcrumb{font-size:.77rem;color:#8892a4}.mobile-menu-btn{display:none;background:none;border:none;font-size:1.4rem;color:#0f1d36;cursor:pointer}.page-content{padding:1.75rem 2rem}
    .card{background:#fff;border-radius:12px;border:1px solid #eceef3;box-shadow:0 1px 2px rgba(15,29,54,.05)}.card-header{padding:1.1rem 1.4rem;border-bottom:1px solid #eceef3;display:flex;align-items:center;justify-content:space-between}.card-header h3{font-size:1.05rem}.card-body{padding:1.4rem}
    .badge-st{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:28px;font-size:.76rem;font-weight:600}.badge-st::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}.badge-st.pendiente{background:#fff8e5;color:#b8860b}.badge-st.aprobado{background:#ecfdf3;color:#0d9f4f}.badge-st.rechazado{background:#fef1f1;color:#d43535}.badge-st.en-revision{background:#eef4ff;color:#2567d8}
    .detail-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1.25rem;margin-bottom:1.75rem;flex-wrap:wrap}.detail-meta{display:flex;align-items:center;gap:.85rem;color:#8892a4;font-size:.82rem;margin-top:.4rem}
    .detail-grid{display:grid;grid-template-columns:1.8fr 1fr;gap:1.35rem}
    .detail-info-row{display:flex;padding:.75rem 0;border-bottom:1px solid #eceef3}.detail-info-row .info-label{width:150px;flex-shrink:0;font-weight:600;color:#64707f;font-size:.82rem}.detail-info-row .info-value{flex:1;color:#374050;font-size:.9rem}
    .timeline{position:relative;padding-left:1.6rem}.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:#d8dce5}.timeline-item{position:relative;padding-bottom:1.15rem}.timeline-item::before{content:'';position:absolute;left:-1.6rem;top:3px;width:10px;height:10px;border-radius:50%;background:#1e3a66;border:2px solid #fff;box-shadow:0 0 0 2px #1e3a66}.timeline-item .timeline-date{font-size:.72rem;color:#8892a4;margin-bottom:.15rem}.timeline-item .timeline-text{font-size:.85rem;color:#4a5568}
    .file-item{display:flex;align-items:center;gap:.65rem;padding:.55rem .7rem;background:#f7f8fa;border-radius:8px;margin-bottom:.4rem;font-size:.82rem}.file-item .file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.7rem 1.4rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;border:none;transition:all .3s ease;text-decoration:none;white-space:nowrap}.btn:disabled{opacity:.55}.btn-primary{background:#162a4a;color:#fff}.btn-primary:hover:not(:disabled){background:#1e3a66}.btn-outline{background:transparent;border:1.5px solid #d8dce5;color:#4a5568}.btn-outline:hover:not(:disabled){border-color:#3562a8;color:#1e3a66}.btn-success{background:#0d9f4f;color:#fff}.btn-success:hover:not(:disabled){background:#0a8340}.btn-danger{background:#d43535;color:#fff}.btn-danger:hover:not(:disabled){background:#b52c2c}.btn-sm{padding:.45rem .85rem;font-size:.8rem}
    .modal-overlay{position:fixed;inset:0;background:rgba(8,14,26,.55);backdrop-filter:blur(6px);z-index:1000;display:none;align-items:center;justify-content:center;padding:2rem}.modal-overlay.active{display:flex}.modal{background:#fff;border-radius:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(15,29,54,.2);animation:scaleUp .2s ease-out}.modal-header{padding:1.35rem 1.5rem;border-bottom:1px solid #eceef3;display:flex;align-items:center;justify-content:space-between}.modal-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:#b8bfcc;padding:.2rem;border-radius:8px}.modal-close:hover{background:#eceef3;color:#4a5568}.modal-body{padding:1.5rem}.modal-footer{padding:1rem 1.5rem;border-top:1px solid #eceef3;display:flex;justify-content:flex-end;gap:.65rem}@keyframes scaleUp{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
    .form-group{margin-bottom:1.15rem}.form-group label{display:block;font-size:.82rem;font-weight:600;color:#4a5568;margin-bottom:.35rem}.form-group select,.form-group textarea{width:100%;padding:.7rem .9rem;border:1.5px solid #d8dce5;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:#1e2738;outline:none;transition:all .3s ease}.form-group select:focus,.form-group textarea:focus{border-color:#3562a8;box-shadow:0 0 0 3px rgba(53,98,168,.1)}.form-group textarea{resize:vertical;min-height:80px}
    .loading-overlay{position:fixed;inset:0;background:rgba(247,248,250,.92);backdrop-filter:blur(6px);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem}.loader{width:42px;height:42px;border:3px solid #d8dce5;border-top-color:#1e3a66;border-radius:50%;animation:spin .7s linear infinite}.loader-text{color:#8892a4;font-size:.88rem}@keyframes spin{to{transform:rotate(360deg)}}.toast-container{position:fixed;top:1.25rem;right:1.25rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem}.hidden{display:none !important}.text-muted{color:#8892a4}.text-sm{font-size:.82rem}.d-flex{display:flex}.gap-1{gap:.5rem}.mb-2{margin-bottom:1rem}
    @media(max-width:1024px){.detail-grid{grid-template-columns:1fr}}
    @media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main-content{margin-left:0}.mobile-menu-btn{display:block}.page-content{padding:1.25rem 1rem}}
  </style>
</head>
<body>
  <div id="loading-overlay" class="loading-overlay"><div class="loader"></div><span class="loader-text">Cargando documento...</span></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <header class="top-header">
        <div><button class="mobile-menu-btn" id="mobile-menu-btn">☰</button></div>
        <div><h1 class="page-title">Detalle del Documento</h1><p class="page-breadcrumb">Panel → Detalle</p></div>
        <div class="header-actions"><button class="btn btn-outline btn-sm" onclick="history.back()">← Volver</button></div>
      </header>
      <div class="page-content">
        <div class="detail-header">
          <div><h1 id="doc-titulo" style="font-size:1.5rem">Cargando...</h1><div class="detail-meta"><span id="doc-estado"></span><span id="doc-fecha">•</span><span id="doc-prioridad"></span></div></div>
          <div class="d-flex gap-1" id="action-buttons"></div>
        </div>
        <div class="detail-grid">
          <div>
            <div class="card mb-2">
              <div class="card-header"><h3>📋 Información</h3></div>
              <div class="card-body" id="doc-info">
                <div class="detail-info-row"><span class="info-label">Título</span><span class="info-value" id="i-titulo">-</span></div>
                <div class="detail-info-row"><span class="info-label">Tipo</span><span class="info-value" id="i-tipo">-</span></div>
                <div class="detail-info-row"><span class="info-label">Prioridad</span><span class="info-value" id="i-pri">-</span></div>
                <div class="detail-info-row"><span class="info-label">Remitente</span><span class="info-value" id="i-remitente">-</span></div>
                <div class="detail-info-row"><span class="info-label">Zona Origen</span><span class="info-value" id="i-zorigen">-</span></div>
                <div class="detail-info-row"><span class="info-label">Destinatario</span><span class="info-value" id="i-dest">-</span></div>
                <div class="detail-info-row"><span class="info-label">Zona Destino</span><span class="info-value" id="i-zdest">-</span></div>
                <div class="detail-info-row"><span class="info-label">Descripción</span><span class="info-value" id="i-desc">-</span></div>
              </div>
            </div>
            <div class="card" id="card-archivos">
              <div class="card-header"><h3>📎 Archivos Adjuntos</h3></div>
              <div class="card-body" id="archivos-list"><p class="text-muted text-sm">Sin archivos adjuntos</p></div>
            </div>
          </div>
          <div>
            <div class="card">
              <div class="card-header"><h3>🕐 Historial</h3></div>
              <div class="card-body"><div class="timeline" id="timeline"><div class="timeline-item"><div class="timeline-date">-</div><div class="timeline-text">Cargando...</div></div></div></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal-estado">
    <div class="modal">
      <div class="modal-header"><h3>📝 Cambiar Estado</h3><button class="modal-close" onclick="document.getElementById('modal-estado').classList.remove('active')">✕</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Nuevo Estado</label><select id="nuevo-estado"><option value="en-revision">En Revisión</option><option value="aprobado">Aprobado</option><option value="rechazado">Rechazado</option><option value="pendiente">Pendiente</option></select></div>
        <div class="form-group"><label>Observación</label><textarea id="obs-estado" rows="3" placeholder="Motivo del cambio..."></textarea></div>
      </div>
      <div class="modal-footer"><button class="btn btn-outline" onclick="document.getElementById('modal-estado').classList.remove('active')">Cancelar</button><button class="btn btn-primary" id="btn-cambiar">Confirmar</button></div>
    </div>
  </div>
  <div class="toast-container" id="toast-container"></div>

  <script type="module">
    import { db, doc, getDoc, updateDoc } from './js/firebase-config.js';
    import { initApp, showToast, formatTipo, capitalizar, formatFechaLarga } from './js/app-shell.js';

    let currentUser, currentDoc, docId;
    try {
      currentUser = await initApp('detalle');
      const params = new URLSearchParams(location.search);
      docId = params.get('id');
      if (!docId) { location.href='panel.html'; return; }
      await loadDoc();
    } catch(e){ console.error(e); }

    async function loadDoc() {
      const snap = await getDoc(doc(db,'documentos',docId));
      if (!snap.exists()) { showToast('No encontrado','error'); setTimeout(()=>location.href='panel.html',1500); return; }
      currentDoc = snap.data();
      render();
    }

    function render() {
      const d = currentDoc;
      const fecha = d.fechaCreacion?.toDate ? d.fechaCreacion.toDate().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'}) : 'Sin fecha';
      document.getElementById('doc-titulo').textContent = d.titulo||'Sin título';
      document.getElementById('doc-estado').innerHTML = `<span class="badge-st ${d.estado||'pendiente'}">${capitalizar(d.estado||'pendiente')}</span>`;
      document.getElementById('doc-fecha').textContent = `📅 ${fecha}`;
      document.getElementById('doc-prioridad').innerHTML = d.prioridad==='urgente'?'🔴 Urgente':d.prioridad==='baja'?'⚪ Baja':'🟡 Normal';
      document.getElementById('i-titulo').textContent = d.titulo||'-';
      document.getElementById('i-tipo').textContent = formatTipo(d.tipoDocumento);
      document.getElementById('i-pri').textContent = capitalizar(d.prioridad||'normal');
      document.getElementById('i-remitente').textContent = d.creadoPorNombre||d.creadoPorEmail||'-';
      document.getElementById('i-zorigen').textContent = `Zona ${d.zonaOrigen||'-'}`;
      document.getElementById('i-dest').textContent = d.destinatario||'No especificado';
      document.getElementById('i-zdest').textContent = `Zona ${d.destinatarioZona||'-'}`;
      document.getElementById('i-desc').textContent = d.descripcion||'Sin descripción';

      // Archivos
      const al = document.getElementById('archivos-list');
      if (d.archivos?.length) {
        al.innerHTML = d.archivos.map(a => {
          const ic = a.tipo?.includes('pdf')?'📄':a.tipo?.includes('image')?'🖼️':'📃';
          return `<div class="file-item"><span>${ic}</span><span class="file-name">${a.nombre}</span><span class="text-sm text-muted">${(a.tamano/1024).toFixed(1)} KB</span><a href="${a.url}" target="_blank" class="btn btn-outline btn-sm">Descargar</a></div>`;
        }).join('');
      }

      // Timeline
      const tl = document.getElementById('timeline');
      if (d.historial?.length) {
        tl.innerHTML = d.historial.slice().reverse().map(h => {
          const dt = h.fecha ? new Date(h.fecha).toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '-';
          return `<div class="timeline-item"><div class="timeline-date">${dt}</div><div class="timeline-text"><strong>${h.accion}</strong><br><span class="text-sm text-muted">${h.usuario}${h.detalle?' — '+h.detalle:''}</span></div></div>`;
        }).join('');
      }

      // Actions
      const canR = ['inspector','admin','regional'].includes(currentUser.rol) && d.creadoPor!==currentUser.uid;
      const ab = document.getElementById('action-buttons');
      if (canR) {
        ab.innerHTML = `<button class="btn btn-success btn-sm" id="b-aprobar">✅ Aprobar</button><button class="btn btn-danger btn-sm" id="b-rechazar">❌ Rechazar</button><button class="btn btn-primary btn-sm" id="b-cambiar">📝 Cambiar Estado</button>`;
        document.getElementById('b-aprobar').addEventListener('click',()=>quickChange('aprobado'));
        document.getElementById('b-rechazar').addEventListener('click',()=>quickChange('rechazado'));
        document.getElementById('b-cambiar').addEventListener('click',()=>document.getElementById('modal-estado').classList.add('active'));
      }
    }

    async function quickChange(estado) {
      if(!confirm(`¿Cambiar a "${capitalizar(estado)}"?`)) return;
      try {
        const ref=doc(db,'documentos',docId);
        const hist=currentDoc.historial||[];
        hist.push({accion:`Estado: ${capitalizar(estado)}`,usuario:currentUser.nombre||currentUser.email,fecha:new Date().toISOString(),detalle:''});
        await updateDoc(ref,{estado,historial:hist,ultimaActualizacion:new Date()});
        showToast(`Documento ${capitalizar(estado)}`,'success');
        await loadDoc();
      } catch(e){ console.error(e); showToast('Error','error'); }
    }

    document.getElementById('btn-cambiar').addEventListener('click', async () => {
      const ne=document.getElementById('nuevo-estado').value;
      const obs=document.getElementById('obs-estado').value.trim();
      const btn=document.getElementById('btn-cambiar');
      btn.disabled=true;
      try {
        const ref=doc(db,'documentos',docId);
        const hist=currentDoc.historial||[];
        hist.push({accion:`Estado: ${capitalizar(ne)}`,usuario:currentUser.nombre||currentUser.email,fecha:new Date().toISOString(),detalle:obs});
        await updateDoc(ref,{estado:ne,historial:hist,ultimaActualizacion:new Date()});
        document.getElementById('modal-estado').classList.remove('active');
        showToast('Estado actualizado','success');
        await loadDoc();
      } catch(e){ console.error(e); showToast('Error','error'); }
      finally { btn.disabled=false; }
    });
  </script>
</body>
</html>
