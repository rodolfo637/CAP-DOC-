<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1d36">
  <title>Gestión CAP — Iniciar Sesión</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230f1d36'/><text x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-size='16' fill='%23c8a951' font-weight='bold'>G</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap');
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
    .login-page{display:flex;min-height:100vh;background:#080e1a;align-items:center;justify-content:center;padding:20px}
    .login-card{background:rgba(15,29,54,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(200,169,81,0.2);padding:40px;border-radius:24px;width:100%;max-width:400px;text-align:center;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5)}
    .logo-container{margin-bottom:32px}
    .logo-symbol{width:64px;height:64px;background:linear-gradient(135deg,#c8a951,#e2c98a);border-radius:16px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:32px;color:#0f1d36;font-weight:800;box-shadow:0 10px 20px rgba(200,169,81,0.3)}
    h1{font-family:'Playfair Display',serif;font-size:28px;margin-bottom:8px;color:#e2c98a}
    p.subtitle{color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:32px}
    .form-group{margin-bottom:20px;text-align:left;position:relative}
    label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#c8a951;margin-bottom:8px;font-weight:600}
    input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);padding:14px 16px;border-radius:12px;color:#fff;font-family:inherit;font-size:15px;transition:all 0.3s ease}
    input:focus{outline:none;border-color:#c8a951;background:rgba(255,255,255,0.08);box-shadow:0 0 0 4px rgba(200,169,81,0.1)}
    .btn-login{width:100%;background:linear-gradient(135deg,#c8a951,#e2c98a);color:#0f1d36;border:none;padding:16px;border-radius:12px;font-weight:700;font-size:16px;cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);margin-top:10px;display:flex;align-items:center;justify-content:center;gap:10px}
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(200,169,81,0.4);filter:brightness(1.1)}
    .btn-login:active{transform:translateY(0)}
    .btn-login:disabled{opacity:0.6;cursor:not-allowed}
    
    /* Fachada del botón Google */
    .divider{margin:24px 0;display:flex;align-items:center;gap:12px;color:rgba(255,255,255,0.2);font-size:11px;text-transform:uppercase;letter-spacing:1.5px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1)}
    .btn-google{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:14px;border-radius:12px;font-weight:500;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;transition:all 0.3s ease}
    .btn-google:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}

    .error-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;padding:12px;border-radius:10px;font-size:13px;margin-bottom:20px;display:none}
    .error-box.show{display:flex;align-items:center;gap:8px;animation:shake 0.4s ease-in-out}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
    .spinner{width:20px;height:20px;border:3px solid rgba(15,29,54,0.3);border-top-color:#0f1d36;border-radius:50%;animation:spin 0.8s linear infinite;display:none}
    .loading .spinner{display:block}
    .loading .btn-text{display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .pw-toggle{position:absolute;right:14px;top:38px;background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;padding:0}
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="logo-container">
        <div class="logo-symbol">G</div>
        <h1>Gestión CAP</h1>
        <p class="subtitle">Sistema de Control Administrativo Profesional</p>
      </div>

      <div id="login-error" class="error-box"><span id="error-message"></span></div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="usuario@gestioncap.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button type="button" id="toggle-pw" class="pw-toggle">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <button id="btn-login" class="btn-login">
        <div class="spinner"></div>
        <span class="btn-text">Entrar al Sistema</span>
      </button>

      <div class="divider">O continuar con</div>

      <button id="btn-google" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span>Google</span>
      </button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signInWithCustomToken, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const initAuth = async () => {
      if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
        try { await signInWithCustomToken(auth, __initial_auth_token); } catch (err) { console.error("Auth Init Error:", err); }
      }
    };
    initAuth();

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'index_main.html';
    });

    const btn = document.getElementById('btn-login');
    const btnGoogle = document.getElementById('btn-google');
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');

    btn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      const password = passInput.value;
      if (!email || !password) return showError('Completa los campos.');
      
      hideError();
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch(e) {
        const msgs = {
          'auth/user-not-found':'No existe una cuenta con ese email.',
          'auth/wrong-password':'Contraseña incorrecta.',
          'auth/invalid-email':'Email no válido.',
          'auth/too-many-requests':'Demasiados intentos. Intente más tarde.',
          'auth/invalid-credential':'Credenciales inválidas. Verifique email y contraseña.',
          'auth/network-request-failed':'Sin conexión a internet.'
        };
        showError(msgs[e.code] || 'Error al iniciar sesión.');
      } finally { btn.classList.remove('loading'); btn.disabled = false; }
    });

    btnGoogle.addEventListener('click', async () => {
      try { await signInWithPopup(auth, provider); } catch (e) { showError('Error al conectar con Google.'); }
    });

    passInput.addEventListener('keyup', e => { if(e.key==='Enter') btn.click(); });
    emailInput.addEventListener('keyup', e => { if(e.key==='Enter') passInput.focus(); });

    document.getElementById('toggle-pw').addEventListener('click', () => {
      passInput.type = passInput.type === 'password' ? 'text' : 'password';
    });

    function showError(msg) { const el = document.getElementById('login-error'); document.getElementById('error-message').textContent = msg; el.classList.add('show'); }
    function hideError() { document.getElementById('login-error').classList.remove('show'); }
  </script>
</body>
</html>
