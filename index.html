<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1d36">
  <title>Gestión CAP — Iniciar Sesión</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230f1d36'/><text x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-size='16' fill='%23c8a951' font-weight='bold'>G</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap');
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
    .login-page{display:flex;min-height:100vh;background:#080e1a;position:relative;overflow:hidden}
    .login-page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 50%,rgba(200,169,81,.07) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 30%,rgba(30,58,102,.25) 0%,transparent 60%);pointer-events:none}
    .login-page::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
    .login-container{display:flex;width:100%;max-width:1140px;margin:auto;padding:2rem;gap:5rem;align-items:center;position:relative;z-index:1}
    .login-branding{flex:1;color:#fff;padding:1rem}
    .logo-badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(200,169,81,.12);border:1px solid rgba(200,169,81,.25);padding:.45rem 1rem;border-radius:28px;font-size:.78rem;color:#d9bf6e;letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:2rem}
    .login-branding h1{font-family:'Playfair Display',serif;font-size:3.2rem;color:#fff;margin-bottom:.4rem;letter-spacing:-.02em;line-height:1.1}
    .login-branding h1 span{color:#c8a951}
    .subtitle{font-size:1.05rem;color:rgba(255,255,255,.5);font-weight:300;margin-bottom:3rem}
    .login-features{display:flex;flex-direction:column;gap:1.5rem}
    .login-feature-item{display:flex;align-items:flex-start;gap:1rem}
    .icon-circle{flex-shrink:0;width:42px;height:42px;border-radius:10px;background:rgba(200,169,81,.1);border:1px solid rgba(200,169,81,.18);display:flex;align-items:center;justify-content:center;font-size:1.15rem}
    .login-feature-item h4{color:#fff;font-size:.9rem;font-weight:600;margin-bottom:.1rem}
    .login-feature-item p{color:rgba(255,255,255,.4);font-size:.82rem;font-weight:300}
    .login-card{flex:0 0 400px;background:#fff;border-radius:18px;padding:2.5rem;box-shadow:0 24px 64px rgba(15,29,54,.2)}
    .login-card h2{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:.25rem;color:#0f1d36}
    .login-subtitle{color:#8892a4;font-size:.88rem;margin-bottom:2rem}
    .form-group{margin-bottom:1.15rem}
    .form-group label{display:block;font-size:.82rem;font-weight:600;color:#4a5568;margin-bottom:.35rem}
    .form-group input{width:100%;padding:.7rem .9rem;border:1.5px solid #d8dce5;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:#1e2738;outline:none;transition:all .3s ease}
    .form-group input:focus{border-color:#3562a8;box-shadow:0 0 0 3px rgba(53,98,168,.1)}
    .form-group input::placeholder{color:#b8bfcc}
    .input-icon-wrap{position:relative}
    .input-icon-wrap .ic{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;opacity:.45}
